<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Booking Confirmed</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef2f7;
}

.ticket{
    max-width:500px;
    margin:40px auto;
    background:#fff;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    color:#0057b8;
    text-align:center;
    margin-bottom:25px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.label{
    color:#666;
}

.value{
    font-weight:bold;
    text-align:right;
}

.status{
    color:green;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    background:#0057b8;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="ticket">

<h1>✈️ Flight Booking Confirmed</h1>

<div class="row"><span class="label">Booking Reference</span><span class="value">HG7L9F</span></div>

<div class="row"><span class="label">Passenger</span><span class="value">Maria Lange</span></div>

<div class="row"><span class="label">Flight</span><span class="value">SF421</span></div>

<div class="row"><span class="label">From</span><span class="value">Hamburg Airport (HAM)</span></div>

<div class="row"><span class="label">To</span><span class="value">Helsinki Airport (HEL), Finland</span></div>

<div class="row"><span class="label">Trip Type</span><span class="value">One Way</span></div>

<div class="row"><span class="label">Date</span><span class="value">22 July 2026</span></div>

<div class=”row”><span class=”label”>Departure</span><span class=”value”>18:45</span></div>

<div class="row"><span class="label">Arrival</span><span class="value">21:15</span></div>

<div class="row"><span class="label">Seat</span><span class="value">14A (Window)</span></div>

<div class="row"><span class="label">Gate</span><span class="value">A12</span></div>

<div class="row"><span class="label">Baggage</span><span class="value">1 Cabin Bag Included</span></div>

<div class="row"><span class="label">Status</span><span class="value status">🟢 Confirmed</span></div>

<button>Manage Booking</button>

</div>

</body>
</html>
